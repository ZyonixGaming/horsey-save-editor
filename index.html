<!doctype html>

<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width,initial-scale=1" name="viewport" />
        <title>Horsey Save Editor</title>
        <style>
            :root {
                --bg: #151922;
                --panel: #1e2633;
                --panel2: #252f3f;
                --panel3: #2d394c;
                --text: #edf2f7;
                --muted: #9aa8bb;
                --soft: #c7d2e1;
                --border: #3b4a61;
                --accent: #7dd3fc;
                --good: #86efac;
                --warn: #facc15;
                --bad: #fb7185;
                --shadow: rgba(0, 0, 0, 0.28);
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                background: linear-gradient(180deg, #111722, var(--bg));
                color: var(--text);
                font:
                    14px/1.45 system-ui,
                    Segoe UI,
                    Roboto,
                    Arial,
                    sans-serif;
            }
            header {
                padding: 24px;
                border-bottom: 1px solid var(--border);
                background: #1a2230;
            }
            h1 {
                margin: 0 0 6px;
                font-size: 24px;
            }
            h2 {
                margin: 0 0 14px;
                font-size: 18px;
            }
            h3 {
                margin: 0 0 10px;
                font-size: 15px;
            }
            p {
                margin: 8px 0;
                color: var(--soft);
            }
            code,
            .mono {
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
            }
            main {
                display: grid;
                grid-template-columns: 380px 1fr;
                gap: 16px;
                padding: 16px;
                max-width: 1500px;
                margin: 0 auto;
            }
            .card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: 0 10px 28px var(--shadow);
                overflow: hidden;
            }
            .card .hd {
                padding: 14px 16px;
                background: var(--panel2);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
            }
            .card .bd {
                padding: 14px 16px;
            }
            .stack {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            .row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .row.wrap {
                flex-wrap: wrap;
				width: 100%;
            }
            input,
            select,
            button,
            textarea {
                font: inherit;
            }
            input[type="file"],
            input[type="text"],
            input[type="number"],
            select,
            textarea {
                background: #111827;
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 8px 10px;
            }
            input[type="number"] {
                width: 120px;
            }
            button {
                background: linear-gradient(180deg, #38bdf8, #0284c7);
                border: 0;
                color: #041018;
                font-weight: 700;
                border-radius: 10px;
                padding: 9px 12px;
                cursor: pointer;
            }
            button.secondary {
                background: #334155;
                color: var(--text);
                border: 1px solid var(--border);
            }
            button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .small {
                font-size: 12px;
                color: var(--muted);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                border: 1px solid var(--border);
                background: #111827;
                border-radius: 999px;
                padding: 3px 8px;
                font-size: 12px;
                color: var(--soft);
            }
            .pill.good {
                border-color: #22c55e66;
                color: var(--good);
            }
            .pill.warn {
                border-color: #eab30866;
                color: var(--warn);
            }
            .pill.bad {
                border-color: #f43f5e66;
                color: var(--bad);
            }
            .list {
                max-height: 70vh;
                overflow: auto;
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding-right: 4px;
            }
            .item {
                border: 1px solid var(--border);
                background: #172030;
                border-radius: 12px;
                padding: 10px;
                cursor: pointer;
            }
            .item:hover,
            .item.active {
                border-color: var(--accent);
                background: #1c2a3d;
            }
            .item .name {
                font-weight: 750;
            }
            .grid2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .grid3 {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }
            .prop-list {
                display: flex;
                flex-direction: column;
                border: 1px solid var(--border);
                border-radius: 14px;
                overflow: hidden;
            }
            .prop {
                display: grid;
                grid-template-columns: 230px 180px 1fr;
                gap: 10px;
                align-items: center;
                padding: 10px 12px;
                border-bottom: 1px solid var(--border);
                background: #172030;
            }
            .prop:last-child {
                border-bottom: 0;
            }
            .prop:nth-child(even) {
                background: #192335;
            }
            .prop label {
                font-weight: 650;
                color: #e5edf8;
            }
            .derived {
                color: var(--muted);
            }
            .hex {
                white-space: pre-wrap;
                word-break: break-word;
                background: #101722;
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 10px;
                color: #d7e2f0;
                max-height: 220px;
                overflow: auto;
            }
            .warnbox {
                border: 1px solid #eab30866;
                background: #42200655;
                border-radius: 12px;
                padding: 10px;
                color: #fde68a;
            }
            .goodbox {
                border: 1px solid #22c55e66;
                background: #052e1655;
                border-radius: 12px;
                padding: 10px;
                color: #bbf7d0;
            }
            details {
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #172030;
                padding: 10px;
            }
            summary {
                cursor: pointer;
                font-weight: 700;
            }













            /* In-game DNA editor merged from the C.R.I.S.P.R editor. */
            .game-dna-editor {
                --inverse-text: #181b22;
                --accent-soft: rgba(56, 189, 248, 0.16);
                --accent-ring-strong: rgba(125, 211, 252, 0.62);
                --green-hi: #86efac;
                --red-lo: #fca5a5;
                --warn-soft: #fde68a;
                --dim: #748297;
                --gene-card-bg: #202733;
                --tooltip-bg: #161d26;
                display: grid;
                gap: 12px;
            }
            .game-dna-toolbar {
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: flex-start;
                flex-wrap: wrap;
            }
            .game-dna-input {
                display: grid;
                gap: 10px;
            }
            .game-dna-input textarea {
                min-height: 150px;
                font-family:
                    "Fira Code", "Cascadia Code", ui-monospace, SFMono-Regular,
                    Menlo, Consolas, monospace;
                line-height: 1.45;
            }
            .game-dna-legend {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }



            .game-base {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                font-weight: 800;
                line-height: 1;
                flex-shrink: 0;
                user-select: none;
            }
            .game-base-A {
                background: var(--A);
                color: var(--inverse-text);
            }
            .game-base-T {
                background: var(--T);
                color: var(--inverse-text);
            }
            .game-base-C {
                background: var(--C);
                color: #fff;
            }
            .game-base-G {
                background: var(--G);
                color: var(--inverse-text);
            }
            .game-base-sm {
                width: 22px;
                height: 22px;
                font-size: 11px;
            }

            .game-muted {
                color: var(--muted);
            }

            @media (max-width: 1000px) {
                main {
                    grid-template-columns: 1fr;
                }
                .prop {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Horsey Save Editor</h1>
            <p>
                Load a Horsey save file, choose a horse, edit its details,
                adjust its DNA, then export the updated save.
            </p>
        </header>
        <main>
            <aside class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Save file</h2>
                        <span class="pill" id="status">No file</span>
                    </div>
                    <div class="bd stack">
                        <input id="fileInput" type="file" />
                        <div class="row wrap">
                            <button disabled="" id="downloadBtn">
                                Export save1.dat
                            </button>
                            <button
                                class="secondary"
                                disabled=""
                                id="clearPatchesBtn"
                            >
                                Clear patches
                            </button>
                        </div>
                        <div class="small" id="summary">
                            Load a <span class="mono">save1.dat</span> file.
                        </div>
                        <div class="small" id="patchSummary"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Horse records</h2>
                        <span class="pill" id="recordCount">0</span>
                    </div>
                    <div class="bd stack">
                        <input
                            id="search"
                            placeholder="Search horse/name/record id…"
                            type="text"
                        />
                        <select id="filter">
							<option value="hasgenome">Has genome</option>
                            <option value="named">Named records</option>														
                            <option value="all">All records</option>
                        </select>
                        <div class="list" id="recordList"></div>
                    </div>
                </section>
            </aside>
            <section class="stack">
                <section class="card">
                    <div class="hd">
                        <h2>Player</h2>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="globalProps"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2 id="selectedTitle">No horse selected</h2>
                        <span class="pill" id="selectedMeta">—</span>
                    </div>
                    <div class="bd stack">
                        <div class="prop-list" id="horseProps"></div>
                        <div id="rawDnaBlock"></div>
                        <div id="detailBlocks"></div>
                    </div>
                </section>
                <section class="card">
                    <div class="hd">
                        <h2>Patch list</h2>
                        <span class="pill" id="patchCount">0 bytes</span>
                    </div>
                    <div class="bd">
                        <div class="hex" id="patchList">No changes yet.</div>
                    </div>
                </section>
            </section>
        </main>

            "use strict";

            const GAME_DNA = (() => {
                const HELIX_COUNT = 20;
                const VALID_BASE_RE = /[^ATCG]/g;
                const BASES = ["A", "T", "C", "G"];
                const BASE_INDEX = Object.freeze({ A: 0, T: 1, C: 2, G: 3 });

                function createElement(tag, attrs = {}, children = []) {
                    const e = document.createElement(tag);
                    for (const [k, v] of Object.entries(attrs)) {
                        if (v == null) continue;
                        if (k === "class") e.className = v;
                        else if (k === "text") e.textContent = v;
                        else if (k === "html") e.innerHTML = v;
                        else if (k === "value") e.value = v;
                        else if (k === "checked") e.checked = Boolean(v);
                        else if (k === "style") e.style.cssText = v;
                        else if (k.startsWith("on") && typeof v === "function")
                            e.addEventListener(k.slice(2), v);
                        else e.setAttribute(k, v);
                    }
                    for (const child of Array.isArray(children)
                        ? children
                        : [children]) {
                        if (child == null) continue;
                        if (typeof child === "string")
                            e.insertAdjacentHTML("beforeend", child);
                        else e.appendChild(child);
                    }
                    return e;
                }
                function sanitizeSequence(value) {
                    return String(value || "")
                        .toUpperCase()
                        .replace(VALID_BASE_RE, "");
                }
                function normalizeGenome(genome) {
                    return genome.map(([s1 = "", s2 = ""]) => [
                        sanitizeSequence(s1),
                        sanitizeSequence(s2),
                    ]);
                }



                function getHelixIndexFactory() {
                    const m = new Map();
                    let next = 0;
                    return (raw) => {
                        const label = String(raw).toUpperCase();
                        if (/^\d{1,2}$/.test(label)) {
                            const i = Number.parseInt(label, 10);
                            return i >= 0 && i < HELIX_COUNT ? i : -1;
                        }
                        if (!m.has(label)) {
                            if (next >= HELIX_COUNT) return -1;
                            m.set(label, next++);
                        }
                        return m.get(label);
                    };
                }
                function parseGenome(text) {
                    const genome =  [...Array(20)].map(e => Array(2));
                    const lines = String(text || "")
                        .trim()
                        .split("\n")
                        .map((l) => l.trim())
                        .filter(Boolean);
                    const getHelixIndex = getHelixIndexFactory();
                    let current = -1;
                    const patterns = {
                        newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                        numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                        verboseBoth:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        verboseFirst:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                        verboseSecond:
                            /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        bareStrand: /^[atcg]+$/i,
                    };
                    function assign(i, seq) {
                        if (i < 0 || i >= HELIX_COUNT) return;
                        if (!genome[i][0]) genome[i][0] = seq;
                        else genome[i][1] = seq;
                    }
                    for (const line of lines) {
                        let match = line.match(patterns.newFormat);
                        if (match) {
                            assign(
                                getHelixIndex(match[1]),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.numbered);
                        if (match) {
                            assign(
                                Number.parseInt(match[1], 10),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.verboseBoth);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0) {
                                genome[current][0] = match[2].toUpperCase();
                                genome[current][1] = match[3].toUpperCase();
                            }
                            continue;
                        }
                        match = line.match(patterns.verboseFirst);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0)
                                genome[current][0] = match[2].toUpperCase();
                            continue;
                        }
                        match = line.match(patterns.verboseSecond);
                        if (match && current >= 0) {
                            genome[current][1] = match[1].toUpperCase();
                            continue;
                        }
                        if (
                            current >= 0 &&
                            !genome[current][1] &&
                            patterns.bareStrand.test(line)
                        )
                            genome[current][1] = line.toUpperCase();
                    }
                    return normalizeGenome(genome);
                }
                function formatGenomeForExport(genome) {
                    const lines = [];
                    genome.forEach(([s1, s2], i) => {
                        const label = String(i).padStart(2, "0");
                        if (s1) lines.push(`${label}:${s1}`);
                        if (s2) lines.push(`${label}:${s2}`);
                    });
                    return lines.join("\n");
                }



                return {
                    HELIX_COUNT,
                    BASES,
                    BASE_INDEX,
                    createElement,
                    sanitizeSequence,
                    normalizeGenome,                    
                    parseGenome,
                    formatGenomeForExport,
                };
            })();

                    if (
                        nameEnd > original.length ||

                    const linkCount = u32(linkCountOffset);

                        throw new Error(

                        );
                    const links = [];

                        offset: off,
                        nameLen,
                        name,
                        fixedOffset,
                        linkCountOffset,

            function findHorseDetailBlocks(idx) {
                if (!original) return [];
				const detailBlocks = [];
				//if (idx<11) return [];
				for (let i in records[idx].detail_off){
					const off = records[idx].detail_off[i];
					if(!off) return [];
					//const hits = allOccurrencesU32(idx >>> 0, tableEnd);
					
					const status =
						off + 6 < original.length ? getByte(off + 6) : null;
					const age =
						off + 7 < original.length ? getByte(off + 7) : null;
					const personality =
						off + 9 < original.length ? getByte(off + 9) : null;	
						/*
						https://horseygame.miraheze.org/wiki/Personality
						0 = Normal
						1 = Preppy
						2 = Grump
						3 = Brainy
						4 = Swaggy
						5 = Cutey

						9 = Algernon de Horsey
						10 = Sweetie

						13 = Rude
						14 onwards will crash
						
						*/
					//off + 14 = tiredness? i think 10 (A) or above is tired. Need to Test
					//off + 6 could be horse status. 0 = ok 1= hot sauce,2=drunk ,3 =flu, 4=dead drunk?, 5=also drunk? 6=dead
					const ownerFlag =
						off + 10 < original.length ? getByte(off + 10) : null;

					const nearbyDna = [{ start: off-248, end: off-8, len:240, near:idx }];
					//if((age>0||idx>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){
					detailBlocks.push({ off, age, ownerFlag, nearbyDna });
					//}
				}
              			
				return detailBlocks;
            }
			
            function findDnaRuns() {
				

				const codeSet = new Set([9, 10, 11, 12, 17, 18, 19, 20, 25, 26, 27, 28, 33, 34, 35, 36]);				
                
                let i = tableEnd;
				//console.log(i + " / " + original.length);
                while (i < original.length) {
                    if (!codeSet.has(original[i])) {
                        i++;
                        continue;
                    }
                    let j = i;
					
                    while (j < original.length && codeSet.has(original[j])&& (j-i+1<=240)) j++;
                    const len = j - i;
                    if (len >= 240) {

						//for(let k=0;k<(len-239);k++){
						for(let k=0;k<1;k++){	 //temporary fixed at 1. need to rethink logic. might not need this check.
							const b0=original[j+8+k];					
							const b1=original[j+9+k];
							const b2=original[j+10+k];
							const b3=original[j+11+k];
							
							const tempindex=((b3*256+b2)*256+b1)*256+b0;						
							if(tempindex>=0&&tempindex<records.length){
								
/*
								if(tempindex<=11){
									console.log("length: "+len+", start: "+i+", end: "+j+", k: "+k+ ", idx: "+tempindex);
								}
*/								
								const off=j+8;
								const status =
									off + 6 < original.length ? getByte(off + 6) : null;
								const age =
									off + 7 < original.length ? getByte(off + 7) : null;
								const personality =
									off + 9 < original.length ? getByte(off + 9) : null;	
								if((age>0||tempindex>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){
									if(!records[tempindex].detail_off){
										records[tempindex].detail_off = [];
									}
								
									records[tempindex].detail_off.push(j+8);
								}									

							}
						}
						
                    }
                    i = j;
					
                }
                
            }

			function readGenome(genomeStart){
				let rows = 20;
				let arr = new Array(rows);		
			
				for (let i = 0; i < rows; i++) {
                    let strand1 = "";
                    let strand2 = "";				
					for (let j = 0; j < GENOME_MAP[i].length; j++) {
						
						const rawIndex=GENOME_MAP[i][j];
						const entry=BYTE_MAP[rawIndex];
						


						const pair = byteToPair(rawIndex, getByte(genomeStart + rawIndex));
						
						if (!pair ||pair.length !== 2||pair.includes("?") ){
							return [];
						}
						
						strand1 += pair[0];
						strand2 += pair[1];

					}
					arr[i] = [strand1,strand2];
				}
				return arr;
			
			}		
			function formatGenome(genome) {
				const lines = [];
				genome.forEach(([s1, s2], i) => {
					const label = String(i).padStart(2, "0");
					if (s1) lines.push(`${label}:${s1}`);
					if (s2) lines.push(`${label}:${s2}`);
				});
				return lines.join("<br>");
			}			

            function renderRawDnaBlock(blocks) {
                const host = $("rawDnaBlock");
                host.innerHTML = "";
                if (!blocks.length) {
                    const box = document.createElement("details");
                    box.open = true;
                    const sum = document.createElement("summary");
                    sum.textContent = "DNA Editor: no genome block found";
                    box.appendChild(sum);

                    p.textContent =
                        "A 240-byte genome block is expected immediately before the selected horse detail block, but no keyed detail block was found.";
                    box.appendChild(p);
                    host.appendChild(box);
                    return;
                }

                const detail = blocks[blocks.length - 1].off;
                const genomeStart = detail - 248;
                const genomeLen = 240;
                const adjacentStart = genomeStart + genomeLen;
				const idx=u32(detail);

                const box = document.createElement("details");
                box.open = true;
                const sum = document.createElement("summary");
                sum.textContent = "DNA Editor";
                box.appendChild(sum);

                if (
                    genomeStart < tableEnd ||
                    adjacentStart + 8 > original.length
                ) {
                    const warn = document.createElement("div");
                    warn.className = "warnbox small";
                    warn.textContent = `Could not place the genome block safely. detail=${hex(detail)}, genomeStart=${hex(genomeStart)}.`;
                    box.appendChild(warn);
                    host.appendChild(box);
                    return;
                }

                const G = GAME_DNA;

				let genome = readGenome(genomeStart);
				
                const writeByteSilently = (off, value) => {
                    value = Number(value) & 0xff;
                    if (value === original[off]) patches.delete(off);
                    else patches.set(off, value);
                };

                const applyGenomeToSave = (nextGenome) => {
					let failures = [];
					let rows = 20;	
				
					for (let i = 0; i < rows; i++) {

						for (let j = 0; j < GENOME_MAP[i].length; j++) {
							
							const rawIndex=GENOME_MAP[i][j];
                            if (rawIndex === null) {
                                failures.push(`${i}:${j} no raw index`);
                                continue;
                            }							
							const entry=BYTE_MAP[rawIndex];
							
							const p1 = nextGenome[i][0][j];
							const p2 = nextGenome[i][1][j];
							const pair = p1+""+p2;
							//console.log(`Helix ${i}, Pair ${j}: ${rawIndex} ${entry.name} ${pair}`);
							
							const nextByte = pairToByte(rawIndex, pair);
							if (nextByte === null) {
								failures.push(
									`${i}:${j} raw[${rawIndex}] cannot encode ${pair}`,
								);
							}else{
								writeByteSilently(genomeStart + rawIndex, nextByte);	
							}							

						}
						
						
						
					}
					
					
                  
                    renderPatchState();
                    if (failures.length) {
                        alert(
                            "Some DNA values could not be written:\n" +
                                failures.slice(0, 12).join("\n") +
                                (failures.length > 12
                                    ? `\n…${failures.length - 12} more`
                                    : ""),
                        );

                    renderRawDnaBlock(findHorseDetailBlocks(idx));
                };

                const resetSelectedDna = () => {

                        patches.delete(genomeStart + i);
                    renderPatchState();
                    renderRawDnaBlock(findHorseDetailBlocks(idx));

                                ),
                            ),
                            "first 55 bytes",
                        ),
                    );
                    wrap.appendChild(plist);

                    if (b.nearbyDna.length) {
                        const d = document.createElement("div");
                        d.className = "goodbox small";
						d.innerHTML = `Nearby DNA-like run(s): ${b.nearbyDna.map(r => 
  '<span class="mono">' + hex(r.start) + ' (' + r.len + ' bytes) <br>' + formatGenome(readGenome(r.start)) + '</span>'
).join(", ")}`;
                        wrap.appendChild(d);
                    }
                    card.appendChild(wrap);
                });

                host.appendChild(card);
            }

 



            function renderPatchState() {
                $("downloadBtn").disabled = !original;
                $("clearPatchesBtn").disabled = !original || patches.size === 0;
                $("patchCount").textContent = `${patches.size} bytes`;
                $("patchSummary").textContent = patches.size
                    ? `${patches.size} byte mutation(s) pending.`
                    : "No changes pending.";
                if (!patches.size) {
                    $("patchList").textContent = "No changes yet.";
                    return;
                }
                const entries = [...patches.entries()].sort(
                    (a, b) => a[0] - b[0],
                );
                $("patchList").textContent = entries
                    .map(
                        ([off, val]) =>
                            `${hex(off, 6)}: ${original[off].toString(16).padStart(2, "0")} -> ${val.toString(16).padStart(2, "0")}`,
                    )
                    .join("\n");
            }

            $("fileInput").addEventListener("change", async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                fileName = file.name || "save1.dat";
                const buf = await file.arrayBuffer();
                original = new Uint8Array(buf);
                view = new DataView(buf);
                patches.clear();
                selectedIndex = -1;
                try {
                    parseSave();
                    renderAll();
                } catch (e) {
                    original = null;
                    view = null;
                    records = [];
                    tableEnd = 0;
                    
                    alert("Could not parse save: " + e.message);
                    renderAll();
                }
            });

            $("search").addEventListener("input", renderRecords);
            $("filter").addEventListener("change", renderRecords);

            $("downloadBtn").addEventListener("click", () => {
                if (!original) return;
                const out = new Uint8Array(original);
                for (const [off, val] of patches) out[off] = val;
                const blob = new Blob([out], {
                    type: "application/octet-stream",
                });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "save1.dat";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    URL.revokeObjectURL(a.href);
                    a.remove();
                }, 1000);
            });

            $("clearPatchesBtn").addEventListener("click", () => {
                patches.clear();
                renderAll();
            });

            renderAll();
        </script>
    </body>
</html>

            const GAME_DNA = (() => {
                const HELIX_COUNT = 20;
                const VALID_BASE_RE = /[^ATCG]/g;
                const BASES = ["A", "T", "C", "G"];
                const BASE_INDEX = Object.freeze({ A: 0, T: 1, C: 2, G: 3 });

                function createElement(tag, attrs = {}, children = []) {
                    const e = document.createElement(tag);
                    for (const [k, v] of Object.entries(attrs)) {
                        if (v == null) continue;
                        if (k === "class") e.className = v;
                        else if (k === "text") e.textContent = v;
                        else if (k === "html") e.innerHTML = v;
                        else if (k === "value") e.value = v;
                        else if (k === "checked") e.checked = Boolean(v);
                        else if (k === "style") e.style.cssText = v;
                        else if (k.startsWith("on") && typeof v === "function")
                            e.addEventListener(k.slice(2), v);
                        else e.setAttribute(k, v);
                    }
                    for (const child of Array.isArray(children)
                        ? children
                        : [children]) {
                        if (child == null) continue;
                        if (typeof child === "string")
                            e.insertAdjacentHTML("beforeend", child);
                        else e.appendChild(child);
                    }
                    return e;
                }
                function sanitizeSequence(value) {
                    return String(value || "")
                        .toUpperCase()
                        .replace(VALID_BASE_RE, "");
                }
                function normalizeGenome(genome) {
                    return genome.map(([s1 = "", s2 = ""]) => [
                        sanitizeSequence(s1),
                        sanitizeSequence(s2),
                    ]);
                }



                function getHelixIndexFactory() {
                    const m = new Map();
                    let next = 0;
                    return (raw) => {
                        const label = String(raw).toUpperCase();
                        if (/^\d{1,2}$/.test(label)) {
                            const i = Number.parseInt(label, 10);
                            return i >= 0 && i < HELIX_COUNT ? i : -1;
                        }
                        if (!m.has(label)) {
                            if (next >= HELIX_COUNT) return -1;
                            m.set(label, next++);
                        }
                        return m.get(label);
                    };
                }
                function parseGenome(text) {
                    const genome =  [...Array(20)].map(e => Array(2));
                    const lines = String(text || "")
                        .trim()
                        .split("\n")
                        .map((l) => l.trim())
                        .filter(Boolean);
                    const getHelixIndex = getHelixIndexFactory();
                    let current = -1;
                    const patterns = {
                        newFormat: /^([A-Za-z0-9]+)\s*:\s*([atcg]+)$/i,
                        numbered: /^(\d{1,2})\s*:\s*([atcg]+)$/i,
                        verboseBoth:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)\s*:\s*(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        verboseFirst:
                            /^helix\s*([A-Za-z0-9]+)[^:)]*[:\)]\s*([atcg]+)$/i,
                        verboseSecond:
                            /^(?:second\s*strand|strand\s*2)[^:]*:\s*([atcg]+)$/i,
                        bareStrand: /^[atcg]+$/i,
                    };
                    function assign(i, seq) {
                        if (i < 0 || i >= HELIX_COUNT) return;
                        if (!genome[i][0]) genome[i][0] = seq;
                        else genome[i][1] = seq;
                    }
                    for (const line of lines) {
                        let match = line.match(patterns.newFormat);
                        if (match) {
                            assign(
                                getHelixIndex(match[1]),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.numbered);
                        if (match) {
                            assign(
                                Number.parseInt(match[1], 10),
                                match[2].toUpperCase(),
                            );
                            continue;
                        }
                        match = line.match(patterns.verboseBoth);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0) {
                                genome[current][0] = match[2].toUpperCase();
                                genome[current][1] = match[3].toUpperCase();
                            }
                            continue;
                        }
                        match = line.match(patterns.verboseFirst);
                        if (match) {
                            current = getHelixIndex(match[1]);
                            if (current >= 0)
                                genome[current][0] = match[2].toUpperCase();
                            continue;
                        }
                        match = line.match(patterns.verboseSecond);
                        if (match && current >= 0) {
                            genome[current][1] = match[1].toUpperCase();
                            continue;
                        }
                        if (
                            current >= 0 &&
                            !genome[current][1] &&
                            patterns.bareStrand.test(line)
                        )
                            genome[current][1] = line.toUpperCase();
                    }
                    return normalizeGenome(genome);
                }
                function formatGenomeForExport(genome) {
                    const lines = [];
                    genome.forEach(([s1, s2], i) => {
                        const label = String(i).padStart(2, "0");
                        if (s1) lines.push(`${label}:${s1}`);
                        if (s2) lines.push(`${label}:${s2}`);
                    });
                    return lines.join("\n");
                }



                return {
                    HELIX_COUNT,
                    BASES,
                    BASE_INDEX,
                    createElement,
                    sanitizeSequence,
                    normalizeGenome,                    
                    parseGenome,
                    formatGenomeForExport,
                };
            })();

            function pairToByte(rawIndex, pair) {
                const entry = BYTE_MAP[rawIndex];
                if (!entry || !entry.n) return null;
				const p1 = pair[0];
				const p2 = pair[1];
				const n1 = entry.n.indexOf(p1)+1;
				const n2 = entry.n.indexOf(p2)+1;
				return (n2*8)+n1;
            }

            function byteToPair(rawIndex, byte) {
                const entry = BYTE_MAP[rawIndex];
                if (!entry || !entry.n) return "??";
			    const targetBytes = new Set([9, 10, 11, 12, 17, 18, 19, 20, 25, 26, 27, 28, 33, 34, 35, 36]);
				if(!targetBytes.has(byte)) return "??";
				const n1 = byte % 8;
				const n2 = (byte-n1)/8;				
				const p1 = entry.n[n1-1];
				const p2 = entry.n[n2-1];
				return p1+""+p2;
            }


            const $ = (id) => document.getElementById(id);

            function hex(n, width = 0) {
                const s = Number(n).toString(16);
                return "0x" + (width ? s.padStart(width, "0") : s);
            }
            function u32(off) {
                return view.getUint32(off, true);
            }
            function i32(off) {
                return view.getInt32(off, true);
            }
            function f32(off) {
                return view.getFloat32(off, true);
            }
            function getByte(off) {
                return patches.has(off) ? patches.get(off) : original[off];
            }
            function getU32Patched(off) {
                return (
                    getByte(off) |
                    (getByte(off + 1) << 8) |
                    (getByte(off + 2) << 16) |
                    ((getByte(off + 3) << 24) >>> 0)
                );
            }
            function getI32Patched(off) {
                const v = getU32Patched(off);
                return v > 0x7fffffff ? v - 0x100000000 : v;
            }
            function setByte(off, value) {
                value = Number(value) & 0xff;
                if (value === original[off]) patches.delete(off);
                else patches.set(off, value);
                renderPatchState();
            }
            function setU32(off, value) {
                value = Number(value) >>> 0;
                for (let i = 0; i < 4; i++)
                    setByte(off + i, (value >>> (8 * i)) & 0xff);
            }
            function setI32(off, value) {
                setU32(off, Number(value) >>> 0);
            }
            function bytesHex(off, len) {
                const out = [];
                for (let i = 0; i < len && off + i < original.length; i++)
                    out.push(
                        getByte(off + i)
                            .toString(16)
                            .padStart(2, "0"),
                    );
                return out.join(" ");
            }

            function parseSave() {
                records = [];
                if (!original || original.length < 0x14)
                    throw new Error("File too small");
                const count = u32(0x10);
                let off = 0x14;
                for (let idx = 0; idx < count; idx++) {
                    if (off + 4 > original.length)
                        throw new Error(
                            `Record ${idx}: missing name length at ${hex(off)}`,
                        );
                    const nameLen = u32(off);
                    const nameStart = off + 4;
                    const nameEnd = nameStart + nameLen;
                    const fixedOffset = nameEnd;
                    const fixedEnd = fixedOffset + 18;
                    const linkCountOffset = fixedEnd;
                    if (
                        nameEnd > original.length ||
                        linkCountOffset + 4 > original.length
                    ) {
                        throw new Error(
                            `Record ${idx}: truncated at ${hex(off)}`,
                        );
                    }
                    const nameBytes = original.slice(nameStart, nameEnd);
                    const name = new TextDecoder("utf-8", {
                        fatal: false,
                    }).decode(nameBytes);
                    const linkCount = u32(linkCountOffset);
                    const linksOffset = linkCountOffset + 4;
                    const next = linksOffset + linkCount * 4;
                    if (next > original.length)
                        throw new Error(
                            `Record ${idx}: truncated links at ${hex(linksOffset)}`,
                        );
                    const links = [];
                    for (let j = 0; j < linkCount; j++)
                        links.push(u32(linksOffset + j * 4));
                    records.push({
                        idx,
                        offset: off,
                        nameLen,
                        name,
                        fixedOffset,
                        linkCountOffset,
                        linksOffset,
                        links,
                        end: next,
                    });
                    off = next;
                }
                tableEnd = off;                
				findDnaRuns();
            }

			function hasGenome(r) {
				if(r.detail_off) return true;
				return false;
			}

			function hasItem(r){
				if(r.detail_off){
					const detailBlocks = findHorseDetailBlocks(r.idx);
					const primaryDetail = detailBlocks.length
						? detailBlocks[detailBlocks.length - 1]
						: null;
					const itemcount = (primaryDetail && primaryDetail.off + 31 +3 < original.length) ? i32(primaryDetail.off + 31) : 0;					
					
					if(itemcount>0){
						return true;
					}

				}
				return false;				
			}
			
			
			function isTired(r){
				if(r.detail_off){
					const detailBlocks = findHorseDetailBlocks(r.idx);
					const primaryDetail = detailBlocks.length
						? detailBlocks[detailBlocks.length - 1]
						: null;
					const tiredFlag = (primaryDetail && primaryDetail.off + 14 < original.length) ? getByte(primaryDetail.off + 14) : 0;					
					
					if((tiredFlag&0x08) !== 0 ){
						return true;
					}

				}
				return false;				
			}

					//if((age>0||idx>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){

            function findDnaRuns() {
				

				const codeSet = new Set([9, 10, 11, 12, 17, 18, 19, 20, 25, 26, 27, 28, 33, 34, 35, 36]);				
                
                let i = tableEnd;
				//console.log(i + " / " + original.length);
                while (i < original.length) {
                    if (!codeSet.has(original[i])) {
                        i++;
                        continue;
                    }
                    let j = i;
					
                    while (j < original.length && codeSet.has(original[j])&& (j-i+1<=240)) j++;
                    const len = j - i;
                    if (len >= 240) {

						//for(let k=0;k<(len-239);k++){
						for(let k=0;k<1;k++){	 //temporary fixed at 1. need to rethink logic. might not need this check.
							const b0=original[j+8+k];					
							const b1=original[j+9+k];
							const b2=original[j+10+k];
							const b3=original[j+11+k];
							
							const tempindex=((b3*256+b2)*256+b1)*256+b0;						
							if(tempindex>=0&&tempindex<records.length){
								
/*
								if(tempindex<=11){
									console.log("length: "+len+", start: "+i+", end: "+j+", k: "+k+ ", idx: "+tempindex);
								}
*/								
								const off=j+8;
								const status =
									off + 6 < original.length ? getByte(off + 6) : null;
								const age =
									off + 7 < original.length ? getByte(off + 7) : null;
								const personality =
									off + 9 < original.length ? getByte(off + 9) : null;	
								if((age>0||tempindex>10)&&age>=0&&age<=11&&personality>=0&&personality<PERSONALITIES.length&&status>=0&&status<7){
									if(!records[tempindex].detail_off){
										records[tempindex].detail_off = [];
									}
								
									records[tempindex].detail_off.push(j+8);
								}									

							}
						}
						
                    }
                    i = j;
					
                }
                
            }


            function makeNumberInput(
                value,
                min,
                max,
                onChange,
                width = "120px",
            ) {
                const input = document.createElement("input");
                input.type = "number";
                input.value = value;
                if (min !== null) input.min = min;
                if (max !== null) input.max = max;
                input.style.width = width;
                input.addEventListener("change", () => onChange(input.value));
                return input;
            }

            function makeCheckbox(checked, onChange) {
                const input = document.createElement("input");
                input.type = "checkbox";
                input.checked = !!checked;
                input.addEventListener("change", () => onChange(input.checked));
                return input;
            }

            function propRow(name, valueEl, derivedText = "", cls = "") {
                const row = document.createElement("div");
                row.className = "prop " + cls;
                const label = document.createElement("label");
                label.textContent = name;
                const val = document.createElement("div");				
                if (valueEl instanceof Node) val.appendChild(valueEl);
                else val.textContent = valueEl;
                const derived = document.createElement("div");
                derived.className = "derived";
                derived.textContent = derivedText;

			function readGenome(genomeStart){
				let rows = 20;
				let arr = new Array(rows);		
			
				for (let i = 0; i < rows; i++) {
                    let strand1 = "";
                    let strand2 = "";				
					for (let j = 0; j < GENOME_MAP[i].length; j++) {
						
						const rawIndex=GENOME_MAP[i][j];
						const entry=BYTE_MAP[rawIndex];
						


						const pair = byteToPair(rawIndex, getByte(genomeStart + rawIndex));
						
						if (!pair ||pair.length !== 2||pair.includes("?") ){
							return [];
						}
						
						strand1 += pair[0];
						strand2 += pair[1];

					}
					arr[i] = [strand1,strand2];
				}
				return arr;
			
			}		
			function formatGenome(genome) {
				const lines = [];
				genome.forEach(([s1, s2], i) => {
					const label = String(i).padStart(2, "0");
					if (s1) lines.push(`${label}:${s1}`);
					if (s2) lines.push(`${label}:${s2}`);
				});
				return lines.join("<br>");
			}			

            function renderRawDnaBlock(blocks) {
                const host = $("rawDnaBlock");
                host.innerHTML = "";
                if (!blocks.length) {
                    const box = document.createElement("details");
                    box.open = true;
                    const sum = document.createElement("summary");
                    sum.textContent = "DNA Editor: no genome block found";
                    box.appendChild(sum);
                    const p = document.createElement("p");
                    p.className = "small";
                    p.textContent =
                        "A 240-byte genome block is expected immediately before the selected horse detail block, but no keyed detail block was found.";
                    box.appendChild(p);
                    host.appendChild(box);
                    return;
                }

                const detail = blocks[blocks.length - 1].off;
                const genomeStart = detail - 248;
                const genomeLen = 240;
                const adjacentStart = genomeStart + genomeLen;
				const idx=u32(detail);

                const box = document.createElement("details");
                box.open = true;
                const sum = document.createElement("summary");
                sum.textContent = "DNA Editor";
                box.appendChild(sum);

                if (
                    genomeStart < tableEnd ||
                    adjacentStart + 8 > original.length
                ) {
                    const warn = document.createElement("div");
                    warn.className = "warnbox small";
                    warn.textContent = `Could not place the genome block safely. detail=${hex(detail)}, genomeStart=${hex(genomeStart)}.`;
                    box.appendChild(warn);
                    host.appendChild(box);
                    return;
                }

                const G = GAME_DNA;

				let genome = readGenome(genomeStart);
				
                const writeByteSilently = (off, value) => {
                    value = Number(value) & 0xff;
                    if (value === original[off]) patches.delete(off);
                    else patches.set(off, value);
                };

                const applyGenomeToSave = (nextGenome) => {
					let failures = [];
					let rows = 20;	
				
					for (let i = 0; i < rows; i++) {

						for (let j = 0; j < GENOME_MAP[i].length; j++) {
							
							const rawIndex=GENOME_MAP[i][j];
                            if (rawIndex === null) {
                                failures.push(`${i}:${j} no raw index`);
                                continue;
                            }							
							const entry=BYTE_MAP[rawIndex];
							
							const p1 = nextGenome[i][0][j];
							const p2 = nextGenome[i][1][j];
							const pair = p1+""+p2;
							//console.log(`Helix ${i}, Pair ${j}: ${rawIndex} ${entry.name} ${pair}`);
							
							const nextByte = pairToByte(rawIndex, pair);
							if (nextByte === null) {
								failures.push(
									`${i}:${j} raw[${rawIndex}] cannot encode ${pair}`,
								);
							}else{
								writeByteSilently(genomeStart + rawIndex, nextByte);	
							}							

						}
						
						
						
					}
					
					
                  
                    renderPatchState();
                    if (failures.length) {
                        alert(
                            "Some DNA values could not be written:\n" +
                                failures.slice(0, 12).join("\n") +
                                (failures.length > 12
                                    ? `\n…${failures.length - 12} more`
                                    : ""),
                        );
                    }
                    renderRawDnaBlock(findHorseDetailBlocks(idx));
                };

                const resetSelectedDna = () => {
                    for (let i = 0; i < genomeLen; i++)
                        patches.delete(genomeStart + i);
                    renderPatchState();
                    renderRawDnaBlock(findHorseDetailBlocks(idx));
                };






                const changedGenomeBytes = Array.from(
                    { length: genomeLen },
                    (_, i) => genomeStart + i,
                ).filter((off) => patches.has(off)).length;

                const editor = document.createElement("div");
                editor.className = "game-dna-editor";

                const toolbar = G.createElement("div", {
                    class: "game-dna-toolbar",
                });
                toolbar.appendChild(
                    G.createElement("div", { class: "game-dna-legend" }, [
                        G.createElement("span", {
                            class: "pill good",
                            text: "in-game DNA format",
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `detail ${hex(detail)}`,
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `genome ${hex(genomeStart)}..${hex(genomeStart + genomeLen)}`,
                        }),
                        G.createElement("span", {
                            class: "pill",
                            text: `${changedGenomeBytes} DNA byte patch(es)`,
                        }),
                    ]),
                );
                const actions = G.createElement("div", { class: "row wrap" });
                toolbar.appendChild(actions);
                editor.appendChild(toolbar);

                const inputWrap = G.createElement("div", {
                    class: "game-dna-input",
                });
                const genomeInput = G.createElement("textarea", {
                    rows: "8",
                    value: G.formatGenomeForExport(genome),
                    placeholder: "00:TTTTTTTTTT\n00:CCCCCCCCCC",
                });
                inputWrap.appendChild(genomeInput);
                editor.appendChild(inputWrap);

                const analyzeButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Analyze / apply genome text",
                });
                const blankButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Load blank A genome",
                });
                const randomButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Randomize genome",
                });

                const copyButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Copy Genome",
                });
                const resetButton = G.createElement("button", {
                    type: "button",
                    class: "secondary",
                    text: "Reset DNA patches",
                });
                actions.append(
                    analyzeButton,
                    randomButton,
                    copyButton,
                    resetButton,
                );

                analyzeButton.addEventListener("click", () =>
                    applyGenomeToSave(G.parseGenome(genomeInput.value)),
                );
                randomButton.addEventListener("click", () => {
                    const randomGenome = Array.from(
                        { length: G.HELIX_COUNT },
                        (_, hi) => {
                            const n = GENOME_MAP[hi]?.length ?? 0;
                            const randomBase = () =>
                                G.BASES[
                                    Math.floor(Math.random() * G.BASES.length)
                                ];
                            return [
                                Array.from({ length: n }, randomBase).join(""),
                                Array.from({ length: n }, randomBase).join(""),
                            ];
                        },
                    );
                    applyGenomeToSave(randomGenome);
                });
                copyButton.addEventListener("click", async () => {
                    genomeInput.value = G.formatGenomeForExport(genome);
                    try {
                        await navigator.clipboard.writeText(genomeInput.value);
                        copyButton.textContent = "Copied";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    } catch {
                        genomeInput.focus();
                        genomeInput.select();
                        copyButton.textContent = "Select & Copy";
                        window.setTimeout(
                            () => (copyButton.textContent = "Copy Genome"),
                            1200,
                        );
                    }
                });
                resetButton.addEventListener("click", resetSelectedDna);




                box.appendChild(editor);
                host.appendChild(box);
            }

let lastUsedFileHandle = null;

// --- INDEXEDDB HELPERS ---
function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("FileHandleDB", 1);
    request.onupgradeneeded = (e) => {
      e.target.result.createObjectStore("handles");
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

async function saveHandle(handle) {
  const db = await openDB();
  const tx = db.transaction("handles", "readwrite");
  tx.objectStore("handles").put(handle, "lastUsed");
  return tx.complete;
}

async function loadHandle() {
  const db = await openDB();
  return new Promise((resolve) => {
    const request = db.transaction("handles").objectStore("handles").get("lastUsed");
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => resolve(null);
  });
}

// --- PERMISSION CHECKER ---
async function verifyPermission(fileHandle, readWrite) {
	return true;
  const options = {};
  if (readWrite) options.mode = 'readwrite';
  
  // Check if permission was already granted in this session
  if ((await fileHandle.queryPermission(options)) === 'granted') return true;
  
  // Explicitly request permission from the user
  if ((await fileHandle.requestPermission(options)) === 'granted') return true;
  
  return false;
}

// --- INITIALIZE APPLICATION ON LOAD ---
window.addEventListener("DOMContentLoaded", async () => {
  lastUsedFileHandle = await loadHandle();
});

// 2. Save the file
// --- UPDATED DOWNLOAD LOGIC ---
$("downloadBtn").addEventListener("click", async () => {
  if (!original) return;

  //const out = new Uint8Array(original);
  const out = original.slice();
  for (const [off, val] of patches) out[off] = val;

  const options = {
    suggestedName: fileName,
    types: [{
      description: "DAT Files",
      accept: { "application/x-dat": [".dat"] }
    }]
  };

  if (lastUsedFileHandle) {
    // Crucial: Check permissions if retrieving an old handle across browser restarts
    const hasPermission = await verifyPermission(lastUsedFileHandle, true);
    if (hasPermission) {
      options.startIn = lastUsedFileHandle;
    }
  }

  try {
    const handle = await window.showSaveFilePicker(options);
    
    // Overwrite the saved handle to track the new output path
    lastUsedFileHandle = handle;
    await saveHandle(handle);

    const writable = await handle.createWritable();
    await writable.write(out);
    await writable.close();
  } catch (err) {
    if (err.name !== "AbortError") console.error("Save failed:", err);
  }
});
